name: Generate Pac-Man contribution graph

on:
  push:
    branches: [main]
  schedule:
    - cron: "15 0 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pacman-contribution
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Generate Pac-Man SVGs
        uses: abozanona/pacman-contribution-graph@d258e3fb01511c1ff4fe6418408ede37b2ad4935 # v5.0.0
        with:
          github_user_name: ${{ github.repository_owner }}
          github_token: ${{ github.token }}
          games: pacman
          player_style: opportunistic

      - name: Validate generated SVGs
        shell: bash
        run: |
          set -euo pipefail
          files=(
            dist/pacman-contribution-graph.svg
            dist/pacman-contribution-graph-dark.svg
          )
          for file in "${files[@]}"; do
            test -s "$file"
            test "$(wc -c < "$file")" -le 2000000
            head -c 1000 "$file" | grep -q '<svg'
            if grep -Eiq '<script|<foreignObject|javascript:' "$file"; then
              echo "Unsafe SVG content in $file" >&2
              exit 1
            fi
          done

      - name: Upload generated SVGs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pacman-svg
          path: |
            dist/pacman-contribution-graph.svg
            dist/pacman-contribution-graph-dark.svg
          if-no-files-found: error
          retention-days: 1

  publish:
    needs: generate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Download generated SVGs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: pacman-svg
          path: dist

      - name: Check out publishing repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          path: publish

      - name: Publish SVGs to output branch
        shell: bash
        run: |
          set -euo pipefail
          cd publish
          if git fetch origin output; then
            git switch -C output origin/output
          else
            git switch --orphan output
            git rm -rf --ignore-unmatch .
          fi

          cp ../dist/pacman-contribution-graph.svg .
          cp ../dist/pacman-contribution-graph-dark.svg .
          git add pacman-contribution-graph.svg pacman-contribution-graph-dark.svg

          if git diff --cached --quiet; then
            echo "Contribution graph is already current."
            exit 0
          fi

          git config user.name "Hong Seong Ju"
          git config user.email "86274319+ghdtjdwn@users.noreply.github.com"
          git commit -m "chore: refresh Pac-Man contribution graph"
          git push origin HEAD:output
